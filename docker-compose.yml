services:

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  postgres:
    image: postgres:15

    environment:
      POSTGRES_DB: enterprise
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql